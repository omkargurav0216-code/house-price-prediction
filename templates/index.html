<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>House Price Prediction</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-dark">
    <div class="container">
      <div class="row">
        <div
          class="card"
          style="width: 100%; height: 100%; margin-top: 50px"
        >
        <div class="card-header" style="text-align: center">
            <h1>WELCOME to House Price Predictor</h1>
        </div>
        <div class="card-body">
            <form action="" method="post" accept-charset="UTF-8">
                <div class="row">
                    <div class="col-md-6 form-group" style="text-align: center">
                        <label><b>Select the Location</b></label>
                        <select class="selectpicker form-control" name="location" id="location" required="1">
                            {% for location in locations %}
                                <option value="{{ location }}">{{ location }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 form-group" style="text-align: center">
                        <label><b>Enter BHK</b></label>
                        <input type="text" class="form-control" id="bhk" name="bhk" placeholder="Enter BHK">
                    </div>
                    <div class="col-md-6 form-group" style="text-align: center">
                        <label><b>Enter Number of Bathrooms</b></label>
                        <input type="text" class="form-control" id="bath" name="bath" placeholder="Enter Number of Bathrooms">
                    </div>
                    <div class="col-md-6 form-group" style="text-align: center">
                        <label><b>Enter Square Feet</b></label>
                        <input type="text" class="form-control" id="total_sqft" name="total_sqft" placeholder="Enter Square Feet">
                    </div>
                    <div class="col-md-12 form-group" style="margin-top: 20px; text-align: center">
                        <button class="btn btn-primary form-control" onclick="send_data()">Predict Price</button>
                    </div>
                </div>
            </form>
            <br>

            <div class="col-md-12" style="text-align: center">
                <h1><span id="prediction"></span></h1>
            </div>
        </div>
    </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script>
        function form_handler(event) {
            event.preventDefault(); // Don't submit the form normally
        }
        function send_data() {
            document.querySelector('form').addEventListener("submit", form_handler);

            var fd=new FormData(document.querySelector('form'));

            var xhr = new XMLHttpRequest();

            xhr.open('POST', '/predict', true);
            document.getElementById('prediction').innerText = "Wait Predicting Price...";

            xhr.onreadystatechange = function(){
                if(xhr.readyState == XMLHttpRequest.DONE){
                    document.getElementById('prediction').innerHTML = 'Prediction: $'+xhr.responseText;
                }
            };

            xhr.onload = function(){};
            xhr.send(fd);

        }
    </script>
  </body>
</html>
